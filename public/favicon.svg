<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="10" fill="#0A0A1A" />
  <!-- Network node pattern forming a "G" shape -->
  <circle cx="24" cy="24" r="20" stroke="#0066FF" stroke-width="1.5" opacity="0.25" />
  <!-- Outer nodes -->
  <circle cx="14" cy="14" r="3" fill="#0066FF" />
  <circle cx="34" cy="14" r="3" fill="#00BCD4" />
  <circle cx="34" cy="34" r="3" fill="#0066FF" />
  <circle cx="14" cy="34" r="3" fill="#00BCD4" />
  <!-- Center node -->
  <circle cx="24" cy="24" r="4" fill="#0066FF" />
  <!-- Connections -->
  <line x1="14" y1="14" x2="24" y2="24" stroke="#0066FF" stroke-width="1.5" />
  <line x1="34" y1="14" x2="24" y2="24" stroke="#00BCD4" stroke-width="1.5" />
  <line x1="34" y1="34" x2="24" y2="24" stroke="#0066FF" stroke-width="1.5" />
  <line x1="14" y1="34" x2="24" y2="24" stroke="#00BCD4" stroke-width="1.5" />
</svg>
