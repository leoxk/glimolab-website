<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- G-path connections (outer ring) -->
  <g stroke-linecap="round">
    <line x1="29" y1="8" x2="41" y2="24" stroke="#0066FF" stroke-width="1" opacity="0.6"/>
    <line x1="41" y1="24" x2="39" y2="33" stroke="#0088DD" stroke-width="1" opacity="0.6"/>
    <line x1="39" y1="33" x2="33" y2="40" stroke="#0099DD" stroke-width="1" opacity="0.6"/>
    <line x1="33" y1="40" x2="24" y2="42" stroke="#00AADD" stroke-width="1" opacity="0.6"/>
    <line x1="24" y1="42" x2="15" y2="40" stroke="#00BCD4" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="40" x2="9" y2="33" stroke="#00BCD4" stroke-width="1" opacity="0.6"/>
    <line x1="9" y1="33" x2="7" y2="24" stroke="#0099DD" stroke-width="1" opacity="0.6"/>
    <line x1="7" y1="24" x2="9" y2="15" stroke="#0088DD" stroke-width="1" opacity="0.6"/>
    <line x1="9" y1="15" x2="15" y2="8" stroke="#0077CC" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="8" x2="24" y2="6" stroke="#0066FF" stroke-width="1" opacity="0.6"/>
    <line x1="24" y1="6" x2="29" y2="8" stroke="#0066FF" stroke-width="1" opacity="0.6"/>
    <!-- Crossbar -->
